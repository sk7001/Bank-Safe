<form [formGroup]="accountForm" (ngSubmit)="onSubmit()">

  <label>Account ID</label>
  <input type="number" formControlName="accountId">
  <p *ngIf="accountForm.get('accountId')?.invalid && accountForm.get('accountId')?.touched">
    Account ID must be greater than 0
  </p>

  <label>Customer ID</label>
  <input type="text" formControlName="customerId">
  <p *ngIf="accountForm.get('customerId')?.invalid && accountForm.get('customerId')?.touched">
    Customer ID is required
  </p>

  <label>Balance</label>
  <input type="number" formControlName="balance">
  <p *ngIf="accountForm.get('balance')?.invalid && accountForm.get('balance')?.touched">
    Balance cannot be negative
  </p>

  <button type="submit" [disabled]="accountForm.invalid">Submit</button>
</form>

<div *ngIf="account">
  <p>Account ID: {{ account.accountId }}</p>
  <p>Customer ID: {{ account.customerId }}</p>
  <p>Balance: {{ account.balance }}</p>
</div>
